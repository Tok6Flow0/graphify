name: Release graph asset

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Install graphify
        run: uv sync --frozen

      - name: Build graph of graphify source (AST-only, no API cost)
        # Extract only the graphify/ package directory — pure Python code, no
        # docs/skill/markdown files — so extraction never needs an LLM API key.
        # --out . writes output to ./graphify-out/ (not ./graphify/graphify-out/).
        run: uv run --frozen graphify extract graphify/ --out .

      - name: Generate HTML viewer
        # HTML is written next to graph.json automatically; no --out flag needed.
        run: uv run --frozen graphify export html --graph graphify-out/graph.json

      - name: Bundle release asset
        run: |
          mkdir -p dist-graph
          cp graphify-out/graph.json    dist-graph/
          cp graphify-out/graph.html    dist-graph/
          cp graphify-out/GRAPH_REPORT.md dist-graph/
          tar -czf graphify-self-graph.tar.gz -C dist-graph .
          echo "Asset contents:"
          tar -tzf graphify-self-graph.tar.gz

      - name: Upload to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: graphify-self-graph.tar.gz

      - name: Upload as workflow artifact (for workflow_dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: graphify-self-graph
          path: graphify-self-graph.tar.gz
          retention-days: 7
